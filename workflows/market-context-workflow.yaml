name: market-context-workflow
description: >
  Market context entry gate assessment v2.0.0. Phase 1 runs
  market_context_gatherer.py (parallel tool orchestration, pending BUY
  extraction, sector mapping). Phase 2 runs market_context_pre_analyst.py
  (regime classification, entry gate logic) then LLM adds qualitative
  narratives. Phase 3 runs market_context_pre_critic.py (5 verification
  checks) then LLM adds qualitative assessment.

version: "2.0.0"

phases:
  - id: gather
    name: Market Context Gathering
    description: Run market_context_gatherer.py — parallel tool execution, pending BUY extraction
    agent: market-context-gatherer
    artifacts:
      - market-context-raw.md
    timeout_minutes: 4

  - id: analyze
    name: Market Context Analysis
    description: Run market_context_pre_analyst.py + LLM qualitative narratives
    agent: market-context-analyst
    depends_on:
      - gather
    requires:
      - market-context-raw.md
    artifacts:
      - market-context-pre-analyst.md
      - market-context-report.md
    timeout_minutes: 6

  - id: review
    name: Market Context Verification
    description: Run market_context_pre_critic.py + LLM qualitative assessment
    agent: market-context-critic
    depends_on:
      - analyze
    requires:
      - market-context-raw.md
      - market-context-report.md
    artifacts:
      - market-context-pre-critic.md
      - market-context-review.md
    timeout_minutes: 5

settings:
  max_fix_iterations: 0
  require_approval: false
  timeout_minutes: 15
