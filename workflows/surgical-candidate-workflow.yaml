name: surgical-candidate-workflow
description: >
  Screen, filter, evaluate, and select surgical mean-reversion candidates.
  Phase 1 runs data collection (screening_data.json) and mechanical scoring
  (candidate_shortlist.md + JSON). Evaluator adds qualitative assessment.
  Phase 2 runs mechanical pre-verification (Python), then qualitative verification.
  Phase 3 runs mechanical pre-critic (Python) for confidence modifiers and
  ranking, then LLM critic applies adversarial qualitative judgment for top 3.

version: "3.1.0"

phases:
  - id: screen
    name: Candidate Screening & Evaluation
    description: >
      Run surgical_screener.py (data collection) and surgical_filter.py
      (mechanical scoring), then qualitatively evaluate pre-scored top 7
    agent: surgical-evaluator
    artifacts:
      - screening_data.json
      - candidate_shortlist.md
      - candidate_shortlist.json
      - candidate-evaluation.md
      - candidate-evaluation.json
    timeout_minutes: 20

  - id: verify
    name: Qualitative Verification
    description: >
      Run mechanical pre-verification (Python), then verify evaluator
      qualitative reasoning. Adjust scores +/-10 for qualitative factors.
      Outputs candidate-verification.md and candidate-verification.json.
    agent: surgical-verifier
    depends_on:
      - screen
    requires:
      - candidate_shortlist.md
      - candidate_shortlist.json
      - candidate-evaluation.md
      - candidate-evaluation.json
      - screening_data.json
    artifacts:
      - candidate-pre-verify.md
      - candidate-verification.md
      - candidate-verification.json
    timeout_minutes: 8

  - id: critic
    name: Final Selection
    description: Run mechanical pre-critic (Python), then adversarial qualitative selection, produce top 3
    agent: surgical-critic
    depends_on:
      - verify
    requires:
      - candidate-evaluation.md
      - candidate-verification.md
      - candidate-verification.json
      - candidate_shortlist.md
      - candidate_shortlist.json
      - candidate-pre-verify.md
      - screening_data.json
    artifacts:
      - candidate-pre-critic.md
      - candidate-final.md
    timeout_minutes: 10

settings:
  max_fix_iterations: 1
  require_approval: false
  timeout_minutes: 45
