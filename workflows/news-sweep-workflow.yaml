name: news-sweep-workflow
description: >
  Portfolio-wide news sweep and cross-ticker sentiment analysis. Phase 1 runs
  news_sentiment.py for every ticker in portfolio.json, extracts condensed
  sentiment summaries and catalyst tables, and writes news-sweep-raw.md.
  Phase 2 produces the cross-ticker analysis report with sentiment heatmap,
  theme detection, risk flags, and actionable recommendations. Phase 3
  verifies the report against raw data for accuracy and completeness.

version: "2.0.0"

phases:
  - id: sweep
    name: News Sweep
    description: Run news_sentiment.py for all portfolio tickers, compile condensed raw data
    agent: news-sweeper
    artifacts:
      - news-sweep-raw.md
    timeout_minutes: 15

  - id: analyze
    name: Cross-Ticker Analysis
    description: Step 0 runs pre-processor (heatmap, flags, themes), then LLM adds qualitative analysis
    agent: news-analyst
    depends_on:
      - sweep
    requires:
      - news-sweep-raw.md
    artifacts:
      - news-sweep-pre-analyst.md
      - news-sweep-report.md
    timeout_minutes: 8

  - id: review
    name: Report Review
    description: Step 0 runs pre-processor (5 verification checks), then LLM adds qualitative review
    agent: news-critic
    depends_on:
      - analyze
    requires:
      - news-sweep-raw.md
      - news-sweep-report.md
    artifacts:
      - news-sweep-pre-critic.md
      - news-sweep-review.md
    timeout_minutes: 6

settings:
  max_fix_iterations: 0
  require_approval: false
  timeout_minutes: 29
