name: exit-review-workflow
description: >
  Periodic exit review for all active positions. v2.0.0 — mechanized with Python
  pre-processors. Phase 1 runs exit_review_gatherer.py (parallel tool orchestration).
  Phase 2 runs exit_review_pre_analyst.py (18-point verdict ruleset) then LLM adds
  qualitative reasoning. Phase 3 runs exit_review_pre_critic.py (6 verification
  checks) then LLM adds qualitative assessment.

version: "2.0.0"

phases:
  - id: gather
    name: Exit Data Gathering
    description: Run exit_review_gatherer.py — parallel tool orchestration for all active positions
    agent: exit-review-gatherer
    artifacts:
      - exit-review-raw.md
    timeout_minutes: 5

  - id: analyze
    name: Exit Analysis
    description: Run exit_review_pre_analyst.py then LLM adds qualitative reasoning and actions
    agent: exit-review-analyst
    depends_on:
      - gather
    requires:
      - exit-review-raw.md
    artifacts:
      - exit-review-pre-analyst.md
      - exit-review-report.md
    timeout_minutes: 10

  - id: review
    name: Exit Review Verification
    description: Run exit_review_pre_critic.py then LLM adds qualitative assessment
    agent: exit-review-critic
    depends_on:
      - analyze
    requires:
      - exit-review-raw.md
      - exit-review-report.md
    artifacts:
      - exit-review-pre-critic.md
      - exit-review-review.md
    timeout_minutes: 8

settings:
  max_fix_iterations: 0
  require_approval: false
  timeout_minutes: 23
