name: status-workflow
description: >
  Daily portfolio status report. Phase 1 runs status_gatherer.py to collect live
  prices, fill detection, and per-ticker structural data. Phase 2 runs
  status_pre_analyst.py for mechanical work then LLM adds qualitative narratives.
  Phase 3 runs status_pre_critic.py for mechanical verification then LLM adds
  qualitative assessment.

version: "2.0.0"

phases:
  - id: gather
    name: Data Gathering
    description: Run status_gatherer.py to collect all raw data
    agent: status-gatherer
    artifacts:
      - status-raw.md
    timeout_minutes: 3

  - id: report
    name: Status Report
    description: Run status_pre_analyst.py then compile qualitative report
    agent: status-analyst
    depends_on:
      - gather
    requires:
      - status-raw.md
    artifacts:
      - status-pre-analyst.md
      - status-report.md
    timeout_minutes: 12

  - id: review
    name: Status Review
    description: Run status_pre_critic.py then add qualitative assessment
    agent: status-critic
    depends_on:
      - report
    requires:
      - status-raw.md
      - status-report.md
    artifacts:
      - status-pre-critic.md
      - status-review.md
    timeout_minutes: 8

settings:
  max_fix_iterations: 0
  require_approval: false
  timeout_minutes: 23
